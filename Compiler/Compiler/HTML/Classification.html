<body>

    <h1>Классификация грамматики</h1>

    <p>
        По классификации Хомского грамматика G[Z] является
        <b>автоматной грамматикой (тип 3)</b>.
    </p>

    <p>
        Это означает, что язык может быть распознан конечным автоматом,
        а правила продукции имеют линейную форму.
    </p>
